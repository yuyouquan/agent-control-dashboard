<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 子代理控制沙盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'SF Mono', sans-serif; background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); color: #e6edf3; min-height: 100vh; }
        
        .header { background: linear-gradient(180deg, #1a2332 0%, #0d1117 100%); padding: 20px 30px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { color: #58a6ff; font-size: 22px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; background: #238636; color: #fff; }
        
        .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #30363d; }
        .stat { background: #161b22; padding: 20px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; }
        .stat-label { font-size: 11px; margin-top: 5px; color: #8b949e; text-transform: uppercase; }
        
        .section { padding: 20px 30px; }
        .section h2 { color: #8b949e; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; }
        
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 16px; }
        
        .agent-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 16px; }
        .agent-card.running { border-left: 4px solid #3fb950; }
        
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .agent-name { font-weight: 600; color: #c9d1d9; }
        .agent-status { padding: 4px 10px; border-radius: 12px; font-size: 11px; background: #238636; color: #fff; }
        
        .agent-meta { display: flex; gap: 20px; color: #8b949e; font-size: 12px; }
        
        .empty-state { text-align: center; padding: 40px; color: #8b949e; }
        .time { text-align: center; padding: 10px; color: #8b949e; font-size: 12px; }
        .note { text-align: center; padding: 10px; background: #1a2332; color: #8b949e; font-size: 12px; border-bottom: 1px solid #30363d; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🧠 子代理控制沙盘</h1>
        <button class="btn" onclick="loadStatus()">🔄 刷新</button>
    </div>
    <div class="note">📌 页面每5秒自动刷新以获取最新状态</div>
    <div class="time" id="updateTime"></div>
    
    <div class="stats-bar">
        <div class="stat"><div class="stat-value" style="color:#3fb950" id="sessionCount">-</div><div class="stat-label">活跃会话</div></div>
        <div class="stat"><div class="stat-value" style="color:#58a6ff" id="mainSession">1</div><div class="stat-label">主会话</div></div>
        <div class="stat"><div class="stat-value" style="color:#f0883e" id="totalTokens">-</div><div class="stat-label">Tokens使用</div></div>
    </div>
    
    <div class="section">
        <h2>🔄 活跃会话</h2>
        <div class="agents-grid" id="sessions">
            <div class="empty-state">加载中...</div>
        </div>
    </div>

    <script>
        async function loadStatus() {
            try {
                const response = await fetch('/subagents_status.json?_=' + Date.now());
                const data = await response.json();
                
                const sessions = data.sessions || [];
                document.getElementById('sessionCount').textContent = sessions.length;
                
                // 提取token使用情况
                const raw = data.raw || '';
                const tokenMatch = raw.match(/(\d+)k\/(\d+)k/);
                if (tokenMatch) {
                    document.getElementById('totalTokens').textContent = tokenMatch[1] + 'k/' + tokenMatch[2] + 'k';
                }
                
                // 渲染会话
                if (sessions.length === 0) {
                    document.getElementById('sessions').innerHTML = '<div class="empty-state">暂无活跃会话</div>';
                } else {
                    document.getElementById('sessions').innerHTML = sessions.map(s => `
                        <div class="agent-card running">
                            <div class="agent-header">
                                <span class="agent-name">💬 ${s.key}</span>
                                <span class="agent-status">活跃</span>
                            </div>
                            <div class="agent-meta">
                                <span>⏱️ ${s.age}</span>
                                <span>📊 ${s.model}</span>
                            </div>
                        </div>
                    `).join('');
                }
                
                document.getElementById('updateTime').textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
            } catch(e) {
                console.error('加载失败:', e);
                document.getElementById('sessions').innerHTML = '<div class="empty-state">加载失败，请刷新</div>';
            }
        }
        
        // 页面加载时获取状态
        loadStatus();
        
        // 每5秒自动刷新
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
